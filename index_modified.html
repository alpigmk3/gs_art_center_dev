  <style>
    @font-face {
      font-family: 'Open Sans';
      font-style: normal;
      font-weight: 400;
      src: local('Open Sans'), local('OpenSans'),
        url('2026-05-08-17-27-21/webwalk/font/open-sans-v28-vietnamese_latin-ext_latin-regular.woff2') format('woff2'),
        /* Chrome 26+, Opera 23+, Firefox 39+ */
        url('2026-05-08-17-27-21/webwalk/font/open-sans-v28-vietnamese_latin-ext_latin-regular.woff') format('woff');
      /* Chrome 6+, Firefox 3.6+, IE 9+, Safari 5.1+ */
    }

    /* Original font awesome font-family names have been replaced to not rely on
       font-weight when determining actual symbol, as it didn't work well
       when rendering using 2D canvas features, and also to avoid spaces in
       the names. */

    @font-face {
      font-family: 'FontAwesomeBrands';
      src: url("2026-05-08-17-27-21/webwalk/font/fa-brands-400.woff2") format("woff2"),
        url("2026-05-08-17-27-21/webwalk/font/fa-brands-400.woff") format("woff");
    }

    @font-face {
      font-family: 'FontAwesomeRegular';
      src: url("2026-05-08-17-27-21/webwalk/font/fa-regular-400.woff2") format("woff2"),
        url("2026-05-08-17-27-21/webwalk/font/fa-regular-400.woff") format("woff");
    }

    @font-face {
      font-family: 'FontAwesomeSolid';
      src: url("2026-05-08-17-27-21/webwalk/font/fa-solid-900.woff2") format("woff2"),
        url("2026-05-08-17-27-21/webwalk/font/fa-solid-900.woff") format("woff");
    }

    #cover-image {
      background-image: url("2026-05-08-17-27-21/cover.jpg");
    }

    .ext-popup-close-button {
      background-image: url("2026-05-08-17-27-21/webwalk/img/close.svg");
    }

    /* CUSTOM UI STYLES */
    #custom-ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 105;
      font-family: 'Open Sans', sans-serif;
    }

    #custom-ui-container>* {
      pointer-events: auto;
    }

    .custom-ui-top-left {
      position: absolute;
      top: 40px;
      left: 40px;
      color: white;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
    }

    .custom-ui-top-left .bar {
      color: #fff;
      margin-right: 8px;
    }

    .custom-ui-top-right {
      position: absolute;
      top: 40px;
      right: 40px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    /* Common Button States (White -> Black) */
    .auto-move-header,
    .seat-btn,
    .nav-text,
    .stage-change-btn,
    .util-btn,
    .nav-arrow {
      background-color: #ffffff;
      color: #000000;
      border: 1px solid #cccccc;
      border-radius: 0;
      box-shadow: none;
      transition: background-color 0.2s, color 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .auto-move-header:hover,
    .seat-btn:hover,
    .nav-text:hover,
    .stage-change-btn:hover,
    .util-btn:hover,
    .nav-arrow:hover {
      background-color: #e6e6e6;
      /* 마우스오버 */
    }

    .auto-move-header:active,
    .seat-btn:active,
    .nav-text:active,
    .stage-change-btn:active,
    .util-btn:active,
    .nav-arrow:active {
      background-color: #999999;
      /* 클릭 */
      border-color: #999999;
      color: #000000;
    }

    .auto-move-header.active,
    .seat-btn.active,
    .nav-text.active,
    .stage-change-btn.active,
    .util-btn.active,
    .nav-arrow.active {
      background-color: #000000;
      /* 활성화 */
      color: #ffffff;
      border-color: #000000;
    }

    /* The vertical bar inside buttons */
    .seat-btn::before,
    .nav-text::before,
    .stage-change-btn::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 14px;
      background-color: currentColor;
      /* Inherits black or white based on state */
    }

    /* Specific element adjustments */
    .auto-move-header {
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auto-move-header .arrow {
      font-size: 12px;
      color: inherit;
    }

    .seat-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }

    .seat-btn {
      padding: 10px 16px 10px 24px;
      /* extra left padding for the bar */
      font-size: 14px;
      font-weight: 700;
      text-align: right;
      min-width: 180px;
      position: relative;
    }

    .seat-btn span {
      font-weight: 900;
      color: inherit;
      margin-right: 5px;
    }

    .custom-ui-bottom-left {
      position: absolute;
      bottom: 40px;
      left: 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }

    .nav-control {
      display: flex;
      align-items: stretch;
    }

    .nav-arrow {
      font-size: 20px;
      font-weight: bold;
      padding: 10px 16px;
      z-index: 1;
    }

    .nav-text {
      padding: 10px 20px 10px 28px;
      /* extra padding for bar */
      font-size: 15px;
      font-weight: 700;
      position: relative;
      margin: 0 -1px;
      /* Overlap borders with arrows */
      z-index: 1;
    }

    .nav-text:hover,
    .nav-text:active,
    .nav-text.active,
    .nav-arrow:hover,
    .nav-arrow:active,
    .nav-arrow.active {
      z-index: 2;
      /* Bring border above siblings */
    }

    .nav-text span {
      font-weight: 900;
      color: inherit;
      margin-right: 5px;
    }

    .stage-change-btn {
      padding: 12px 30px 12px 40px;
      /* extra padding for bar */
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      position: relative;
      width: 100%;
    }

    .custom-ui-bottom-right {
      position: absolute;
      bottom: 40px;
      right: 40px;
      display: flex;
      gap: 12px;
    }

    .util-btn {
      width: 44px;
      height: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .util-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    /* SEAT MAP POPUP STYLES */
    .seatmap-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0);
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      pointer-events: none;
      transition: background-color 0.3s ease;
      overflow: hidden;
    }

    .seatmap-overlay.active {
      background-color: rgba(0, 0, 0, 0.6);
      pointer-events: auto;
    }

    .seatmap-popup {
      background-color: white;
      width: 82%;
      max-width: 1800px;
      height: 86%;
      max-height: 1200px;
      border-radius: 0;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 30px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .seatmap-overlay.active .seatmap-popup {
      transform: translateY(0);
    }

    .seatmap-close-btn {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px;
    }

    .seatmap-close-btn svg {
      width: 40px;
      height: 40px;
      fill: #cccccc;
      transition: fill 0.2s;
    }

    .seatmap-close-btn:hover svg {
      fill: #666666;
    }

    .seatmap-header {
      background-color: #999999;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 24px;
      font-weight: 700;
      margin-top: 15px;
      margin-bottom: 25px;
    }

    .seatmap-content {
      display: flex;
      flex: 1;
      gap: 20px;
      min-height: 0;
    }

    .seatmap-floor-selector {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 70px;
    }

    .floor-btn {
      background-color: white;
      color: black;
      border: 1px solid #cccccc;
      padding: 15px 0;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .floor-btn:hover {
      background-color: #e6e6e6;
    }

    .floor-btn.active {
      background-color: black;
      color: white;
      border-color: black;
    }

    .seatmap-map-container {
      flex: 1;
      border: 1px solid #cccccc;
      background-color: #ffffff;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }

    .seatmap-map-container:active {
      cursor: grabbing;
    }

    .seatmap-zoom-controls {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .seatmap-zoom-controls button {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #cccccc;
      color: #333;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      transition: all 0.2s;
    }

    .seatmap-zoom-controls button:hover {
      background: #f0f0f0;
    }

    .seatmap-zoom-controls button:active {
      background: #e0e0e0;
      transform: scale(0.95);
    }

    #seatmap-zoom-reset {
      font-size: 18px;
    }

    #seatmap-zoom-content {
      transform-origin: center center;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    #seatmap-zoom-content.dragging {
      transition: none !important;
    }

    #seatmap-zoom-content img {
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .seatmap-section-selector {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 160px;
    }

    .section-btn {
      background-color: white;
      color: black;
      border: 1px solid #cccccc;
      padding: 12px 10px 12px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      position: relative;
      transition: all 0.2s;
    }

    .section-btn::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 14px;
      background-color: currentColor;
    }

    .section-btn:hover {
      background-color: #e6e6e6;
    }

    .section-btn.active {
      background-color: black;
      color: white;
      border-color: black;
    }

    .section-btn span {
      font-weight: 900;
      margin-right: 5px;
      color: inherit;
    }

    
    /* Seatmap Specific Styles */
    #seatmap-zoom-content {
      --seat-w: 26px;
      --seat-h: 26px;
      --gap: 3px;
      --b-zone-width: 400px;
      padding: 20px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #seatmap-zoom-content .floor-section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; display: none; width: 100%; }
    #seatmap-zoom-content .floor-section.active { display: block; }
    #seatmap-zoom-content .floor-title { font-size: 20px; font-weight: bold; color: #1a73e8; margin-bottom: 25px; text-align: center; display: none; }
    #seatmap-zoom-content .theater-layout { display: flex; justify-content: center; gap: 30px; align-items: flex-start; }
    #seatmap-zoom-content .zone-box { display: flex; flex-direction: column; align-items: center; transition: transform 0.3s, box-shadow 0.3s; padding: 10px; border-radius: 8px; }
    #seatmap-zoom-content .zone-box.active { box-shadow: 0 0 15px rgba(26, 115, 232, 0.5); transform: scale(1.02); background-color: #f8fbff; }
    #seatmap-zoom-content .zone-label { font-weight: bold; margin-bottom: 15px; font-size: 12px; background: #444; color: #fff; padding: 3px 15px; border-radius: 3px; }
    #seatmap-zoom-content .rows-wrap { display: flex; flex-direction: column; }
    #seatmap-zoom-content .zone-B .rows-wrap { width: var(--b-zone-width); }
    #seatmap-zoom-content .seat-row { display: flex; align-items: center; margin-bottom: var(--gap); height: var(--seat-h); }
    #seatmap-zoom-content .row-num { font-size: 10px; color: #bbb; width: 40px; text-align: right; padding-right: 10px; flex-shrink: 0; }
    
    #seatmap-zoom-content .seatmap-seat-btn {
        height: var(--seat-h);
        background-color: #fff;
        border: 1px solid #ddd;
        border-radius: 3px;
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-sizing: border-box;
        margin-right: var(--gap);
        flex-shrink: 0;
        padding: 0;
        transition: all 0.2s;
        color: #000;
        min-width: unset; /* override index.html */
        text-align: center;
    }
    #seatmap-zoom-content .seatmap-seat-btn:last-child { margin-right: 0; }
    #seatmap-zoom-content .seatmap-seat-btn:hover { background-color: #e3f2fd; border-color: #2196f3; z-index: 10; }
    #seatmap-zoom-content .seatmap-seat-btn:active { transform: scale(0.95); background-color: #bbdefb; border-color: #1976d2; }

    #seatmap-zoom-content .zone-A .seatmap-seat-btn, #seatmap-zoom-content .zone-C .seatmap-seat-btn { width: var(--seat-w); }
    #seatmap-zoom-content .zone-B .seatmap-seat-btn { flex-grow: 1; flex-basis: 0; }
    
    #seatmap-zoom-content .seatmap-seat-btn.none { visibility: hidden; pointer-events: none; border: none; }
    #seatmap-zoom-content .has-extra .seatmap-seat-btn.none { display: none; }
    #seatmap-zoom-content .seatmap-seat-btn.disability { background-color: #fff9c4; border-color: #fbc02d; color: #f57f17; font-weight: bold; }
    #seatmap-zoom-content .seatmap-seat-btn.extra-27 { background-color: #ffebee; border-color: #ef9a9a; font-weight: bold; }
    #seatmap-zoom-content .seatmap-seat-btn.extra-17 { background-color: #e3f2fd; border-color: #90caf9; font-weight: bold; }
    
    #seatmap-zoom-content .legend { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; font-size: 11px; width: 100%; }
    #seatmap-zoom-content .legend-item { display: flex; align-items: center; gap: 5px; }
    #seatmap-zoom-content .l-box { width: 12px; height: 12px; border: 1px solid #ccc; }

    /* Responsive */
    @media (max-width: 768px) {
      .seatmap-popup {
        width: 95%;
        height: 95%;
        padding: 15px;
      }

      .seatmap-header {
        font-size: 18px;
        padding: 10px;
        margin-top: 15px;
        margin-bottom: 15px;
      }

      .seatmap-content {
        flex-direction: column;
      }

      .seatmap-floor-selector {
        flex-direction: row;
        width: 100%;
      }

      .floor-btn {
        padding: 10px;
        font-size: 16px;
        flex: 1;
      }

      .seatmap-section-selector {
        flex-direction: row;
        width: 100%;
        overflow-x: auto;
      }

      .section-btn {
        padding: 10px 15px;
        font-size: 14px;
        white-space: nowrap;
      }
    }
  </style>

</head>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btnSeatmap = document.getElementById('btn_seatmap');
      const seatmapOverlay = document.getElementById('seatmap-overlay');
      const closeBtn = document.querySelector('.seatmap-close-btn');

      if (btnSeatmap && seatmapOverlay && closeBtn) {
        btnSeatmap.addEventListener('click', () => {
          seatmapOverlay.classList.add('active');
        });

        closeBtn.addEventListener('click', () => {
          seatmapOverlay.classList.remove('active');
        });

        // Close when clicking outside the popup
        seatmapOverlay.addEventListener('click', (e) => {
          if (e.target === seatmapOverlay) {
            seatmapOverlay.classList.remove('active');
          }
        });
      }

      // Zoom and Pan Logic
      const mapContainer = document.getElementById('seatmap-map-container');
      const zoomContent = document.getElementById('seatmap-zoom-content');
      let currentScale = 1;
      let posX = 0;
      let posY = 0;
      let isDragging = false;
      let startX, startY;

      function applyZoomAndPan() {
        zoomContent.style.transform = `translate(${posX}px, ${posY}px) scale(${currentScale})`;
      }

      mapContainer.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        e.preventDefault();
        isDragging = true;
        startX = e.clientX - posX;
        startY = e.clientY - posY;
        zoomContent.classList.add('dragging');
        mapContainer.style.cursor = 'grabbing';
      });

      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX;
        posY = e.clientY - startY;
        applyZoomAndPan();
      });

      window.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        zoomContent.classList.remove('dragging');
        mapContainer.style.cursor = 'grab';
      });

      // Also support touch for dragging
      mapContainer.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          isDragging = true;
          startX = e.touches[0].clientX - posX;
          startY = e.touches[0].clientY - posY;
          zoomContent.classList.add('dragging');
        }
      }, { passive: false });

      window.addEventListener('touchmove', (e) => {
        if (!isDragging || e.touches.length !== 1) return;
        e.preventDefault(); // prevent scrolling
        posX = e.touches[0].clientX - startX;
        posY = e.touches[0].clientY - startY;
        applyZoomAndPan();
      }, { passive: false });

      window.addEventListener('touchend', () => {
        isDragging = false;
        zoomContent.classList.remove('dragging');
      });

      document.getElementById('seatmap-zoom-in').addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentScale < 3.0) {
          currentScale = Math.min(3.0, currentScale + 0.5);
          applyZoomAndPan();
        }
      });

      document.getElementById('seatmap-zoom-out').addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentScale > 0.5) {
          currentScale = Math.max(0.5, currentScale - 0.5);
          applyZoomAndPan();
        }
      });

      document.getElementById('seatmap-zoom-reset').addEventListener('click', (e) => {
        e.stopPropagation();
        currentScale = 1;
        posX = 0;
        posY = 0;
        applyZoomAndPan();
      });

    });
  </script>
